<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画符模拟器 - 手势召唤符纸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0500;
      font-family: 'STKaiti', 'KaiTi', 'SimSun', serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    /* 摄像头画面 */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }
    /* 各种Canvas层 */
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* 层级顺序：符纸 -> 虚线引导 -> 画笔轨迹 -> 特效 -> 手部追踪 */
    #paperCanvas { z-index: 10; }
    #guideCanvas { z-index: 15; opacity: 0.5; }
    #drawCanvas { z-index: 20; }
    #fxCanvas    { z-index: 25; }
    #handCanvas  { z-index: 30; }
    
    /* 标题 */
    #titleBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: linear-gradient(180deg, rgba(0,0,0,0.88), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    #titleBar h1 {
      font-size: 26px;
      color: #e8c97d;
      text-shadow: 0 0 15px #ff6600, 0 0 30px #330000;
      letter-spacing: 6px;
    }

    /* 左侧符咒面板 */
    #talismanPanel {
      position: absolute;
      left: 0; top: 56px; bottom: 0;
      width: 170px;
      background: linear-gradient(180deg, rgba(20,8,2,0.93), rgba(10,5,2,0.87));
      border-right: 1px solid rgba(200,140,40,0.4);
      z-index: 100;
      overflow-y: auto;
      padding: 8px 6px;
    }
    .talisman-card {
      background: rgba(30,15,5,0.8);
      border: 1px solid rgba(200,140,40,0.3);
      border-radius: 6px;
      margin-bottom: 8px;
      padding: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .talisman-card:hover, .talisman-card.active {
      border-color: rgba(200,140,40,0.9);
      background: rgba(80,40,5,0.85);
      box-shadow: 0 0 12px rgba(255,100,0,0.4);
    }
    .t-name {
      color: #e8c97d;
      font-size: 12px;
      text-align: center;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    .talisman-preview {
      width: 100%;
      height: 110px;
      display: block;
      border-radius: 3px;
      background: rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    .t-desc {
      color: #a08050;
      font-size: 10px;
      text-align: center;
      margin-top: 4px;
      line-height: 1.5;
    }

    /* 右侧控制面板 */
    #controlPanel {
      position: absolute;
      right: 0; top: 56px;
      width: 148px;
      background: linear-gradient(180deg, rgba(20,8,2,0.93), rgba(10,5,2,0.87));
      border-left: 1px solid rgba(200,140,40,0.4);
      z-index: 100;
      padding: 10px 9px;
    }
    .ctrl-title {
      color: #e8c97d;
      font-size: 12px;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px #ff6600;
    }
    .ctrl-label {
      color: #a08050;
      font-size: 10px;
      margin-bottom: 3px;
    }
    .ctrl-slider {
      width: 100%;
      margin-bottom: 10px;
      accent-color: #e8c97d;
    }
    .color-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .color-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .color-dot:hover, .color-dot.active {
      border-color: #fff;
      transform: scale(1.2);
    }
    .ctrl-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin-bottom: 7px;
      background: rgba(80,40,5,0.8);
      border: 1px solid rgba(200,140,40,0.5);
      border-radius: 4px;
      color: #e8c97d;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      background: rgba(100,50,10,0.9);
      box-shadow: 0 0 10px rgba(255,100,0,0.4);
    }
    .ctrl-btn.danger {
      border-color: rgba(200,50,50,0.5);
      color: #e87d7d;
    }
    .ctrl-btn.summon {
      border-color: rgba(220,190,40,0.8);
      color: #ffd700;
      background: rgba(60,30,5,0.85);
      font-size: 12px;
      font-weight: bold;
      padding: 10px;
    }
    .ctrl-btn.summon:hover {
      box-shadow: 0 0 14px rgba(255,200,0,0.6);
    }

    /* 底部状态栏 */
    #statusBar {
      position: absolute;
      bottom: 0; left: 170px; right: 148px;
      height: 38px;
      background: linear-gradient(0deg, rgba(0,0,0,0.88), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
    }
    .status-item {
      color: #a08050;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .status-item span {
      color: #e8c97d;
    }

    /* 手势提示 */
    #gestureHint {
      position: absolute;
      bottom: 46px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(200,140,40,0.4);
      border-radius: 20px;
      padding: 7px 18px;
      color: #e8c97d;
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 120;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 模式指示器 */
    #modeIndicator {
      position: absolute;
      top: 64px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      padding: 4px 14px;
      color: #e8c97d;
      font-size: 11px;
      z-index: 110;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    /* 相似度进度条 */
    #similarityBar {
      position: absolute;
      bottom: 44px; left: 190px; right: 168px;
      height: 5px;
      background: rgba(255,255,255,0.1);
      z-index: 110;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #similarityFill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, #e8c97d, #ff6600);
      box-shadow: 0 0 6px #ff6600;
      transition: width 0.3s;
    }
    #similarityLabel {
      position: absolute;
      bottom: 54px; left: 50%;
      transform: translateX(-50%);
      color: #e8c97d;
      font-size: 11px;
      letter-spacing: 2px;
      z-index: 110;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 召唤提示 */
    #summonHint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 105;
      opacity: 0;
      transition: opacity 0.6s;
    }
    .sh-text {
      color: rgba(232,201,125,0.55);
      font-size: 20px;
      letter-spacing: 6px;
      text-shadow: 0 0 12px rgba(255,150,0,0.35);
    }
    .sh-sub {
      color: rgba(160,128,80,0.5);
      font-size: 13px;
      letter-spacing: 3px;
      margin-top: 8px;
    }

    /* 符纸状态 */
    #paperStatus {
      position: absolute;
      top: 64px; right: 158px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(200,140,40,0.4);
      border-radius: 10px;
      padding: 3px 10px;
      color: #e8c97d;
      font-size: 11px;
      letter-spacing: 2px;
      z-index: 110;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* 完成横幅 */
    #completeBanner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 160;
      text-align: center;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
      opacity: 0;
    }
    #completeBanner .b-title {
      font-size: 58px;
      letter-spacing: 10px;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      white-space: nowrap;
    }
    #completeBanner .b-sub {
      font-size: 20px;
      letter-spacing: 5px;
      margin-top: 6px;
      opacity: 0.85;
    }
    #completeBanner.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* 加载遮罩 */
    #loadingOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #loadingOverlay h2 {
      color: #e8c97d;
      font-size: 40px;
      letter-spacing: 10px;
      text-shadow: 0 0 20px #ff6600, 0 0 40px #330000;
      margin-bottom: 8px;
    }
    #loadingOverlay p {
      color: #a08050;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 28px;
    }
    .loading-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(200,140,40,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e8c97d, #ff6600);
      border-radius: 2px;
      animation: loadingAnim 2s ease-in-out infinite;
    }
    @keyframes loadingAnim {
      0%, 100% { width: 0%; }
      50% { width: 80%; }
    }
    .loading-text {
      color: #a08050;
      font-size: 11px;
      margin-top: 10px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <!-- 摄像头画面 -->
  <video id="video" autoplay muted playsinline></video>

  <!-- 各种Canvas层 -->
  <canvas id="guideCanvas"></canvas>
  <canvas id="paperCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
  <canvas id="handCanvas"></canvas>

  <!-- 标题 -->
  <div id="titleBar">
    <h1>☯ 画符模拟器 ☯</h1>
  </div>

  <!-- 左侧符咒选择面板 -->
  <div id="talismanPanel">
    <div class="t-name" style="margin-bottom: 10px; border-bottom: 1px solid rgba(200,140,40,0.3); padding-bottom: 5px;">符咒图鉴</div>
  </div>

  <!-- 右侧控制面板 -->
  <div id="controlPanel">
    <div class="ctrl-title">控制台</div>
    
    <div class="ctrl-label">笔触大小</div>
    <input type="range" class="ctrl-slider" id="brushSize" min="2" max="18" value="5">
    
    <div class="ctrl-label">笔触颜色</div>
    <div class="color-row" id="colorRow"></div>
    
    <div class="ctrl-label">发光强度</div>
    <input type="range" class="ctrl-slider" id="glowStrength" min="0" max="30" value="12">
    
    <button class="ctrl-btn summon" id="summonBtn">✦ 召唤符纸</button>
    
    <button class="ctrl-btn" id="toggleGuide">隐藏引导</button>
    <button class="ctrl-btn danger" id="clearBtn">清除重置</button>
  </div>

  <!-- 底部状态栏 -->
  <div id="statusBar">
    <div class="status-item">手势：<span id="gestureStatus">检测中…</span></div>
    <div class="status-item">符纸：<span id="paperStatusTxt">未召唤</span></div>
    <div class="status-item">当前：<span id="currentTalisman">未选择</span></div>
  </div>

  <!-- 手势提示 -->
  <div id="gestureHint"></div>

  <!-- 模式指示器 -->
  <div id="modeIndicator">✏️ 绘画中</div>

  <!-- 相似度显示 -->
  <div id="similarityBar">
    <div id="similarityFill"></div>
  </div>
  <div id="similarityLabel">匹配度：0%</div>

  <!-- 召唤提示 -->
  <div id="summonHint">
    <div class="sh-text">选择符咒后召唤符纸</div>
    <div class="sh-sub">左侧选符 → 点击「召唤符纸」→ 食指画符 → 五指激活</div>
  </div>

  <!-- 符纸状态徽章 -->
  <div id="paperStatus">符纸就绪</div>

  <!-- 完成横幅 -->
  <div id="completeBanner">
    <div class="b-title" id="bannerTitle"></div>
    <div class="b-sub" id="bannerSub"></div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loadingOverlay">
    <h2>画符模拟器</h2>
    <p>符咒 · 道法 · 天地之力</p>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text" id="loadingText">正在加载手势识别模型…</div>
  </div>

  <!-- 引入外部JS库 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <!-- 引入本地JS模块 -->
  <script src="talisman-data.js"></script>
  <script src="talisman-core.js"></script>
  <script src="talisman-paper.js"></script>
  <script src="talisman-sim.js"></script>
  <script src="talisman-fx.js"></script>
</body>
</html>
